<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг намораживания инея</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 30px;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: #003366;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0050a0;
        }

        #webcam-container {
            margin-bottom: 20px;
            border: 5px solid white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #label-container {
            color: #003366;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .footer-info {
            margin-top: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #003366;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
        }

        .footer-info img {
            height: 60px;
            width: auto;
        }
    </style>
</head>
<body>

    <h1>Мониторинг намораживания инея</h1>
    
    <button type="button" onclick="init()">Включить камеру</button>
    
    <div id="webcam-container"></div>
    <div id="label-container">Включи камеру</div>

    <div class="footer-info">
        <img src="emblem.png" alt="БГУТ">
        <p>© 2026, Научно-исследовательская работа студентов гр. НТ-241, БГУТ</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        // Ваша ссылка на модель
        const URL = "https://teachablemachine.withgoogle.com/models/t6ijRGo9j/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            let bestPrediction = "";
            let highestProb = 0;
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestPrediction = prediction[i].className;
                }
            }
            labelContainer.innerHTML = bestPrediction;
        }
    </script>
</body>
</html>
