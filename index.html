<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг намораживания инея</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Применяем новый шрифт Roboto */
            font-family: 'Roboto', sans-serif;
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 30px;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding-bottom: 20px; /* Отступ внизу для подписи */
        }

        h1 {
            color: #003366;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        button {
            /* Общие стили для кнопки и label */
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 400;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            display: block;
            min-width: 250px;
        }

        button {
            background-color: #003366;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0050a0;
        }

        /* Заставляем контейнер для лейбла выглядеть так же, как кнопка */
        #label-container {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            margin-bottom: 15px;
            margin-top: 15px;
            display: inline-block;
            color: #003366;
            background: rgba(255, 255, 255, 0.7);
            min-width: 250px;
            box-sizing: border-box; /* Чтобы padding не увеличивал ширину */
        }

        #webcam-container {
            margin-bottom: 15px;
            margin-top: 15px;
            border: 5px solid white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            width: 310px; /* Немного шире чем 300x300 canvas */
            height: 310px;
        }

        /* Стили для подписи внизу */
        .footer-info {
            margin-top: auto; /* Прижимает к низу */
            margin-bottom: 10px;
            display: flex;
            align-items: center; /* Выравнивает эмблему и текст по вертикали */
            gap: 15px; /* Отступ между эмблемой и текстом */
            color: #003366;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 15px;
            max-width: 90%; /* Чтобы не выходило за края на мобильных */
            box-sizing: border-box;
            width: auto;
        }

        .footer-info img {
            height: 60px; /* Высота эмблемы */
            width: auto;
            flex-shrink: 0; /* Не дает эмблеме сжиматься */
        }

        .footer-info p {
            font-size: 14px;
            line-height: 1.4;
            text-align: left; /* Выравнивает текст в подписи по левому краю */
            margin: 0; /* Убираем стандартные отступы <p> */
            font-weight: 300; /* Более тонкий шрифт для текста */
        }
    </style>
</head>
<body>

    <h1>Мониторинг намораживания инея</h1>
    
    <button type="button" onclick="init()">Включить камеру</button>
    
    <div id="webcam-container"></div>
    <div id="label-container">Включи камеру</div>
    <div class="footer-info">
        <img src="emblem.png" alt="БГУТ">
        <p>© 2026, Научно-исследовательская работа студентов гр. НТ-241, БГУТ</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        // Ваша ссылка на модель
        const URL = "https://teachablemachine.withgoogle.com/models/t6ijRGo9j/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            let bestPrediction = "";
            let highestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestPrediction = prediction[i].className;
                }
            }
            // Обновляем текст label-container
            labelContainer.innerHTML = bestPrediction;
        }
    </script>
</body>
</html>
