<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг намораживания инея</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 30px;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: #003366;
            margin-bottom: 20px;
            font-size: 26px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            padding: 0 10px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 400;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            min-width: 280px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0050a0;
        }

        #label-container {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 10px;
            margin-bottom: 20px;
            display: inline-block;
            color: #003366;
            background: rgba(255, 255, 255, 0.7);
            min-width: 280px;
            box-sizing: border-box;
        }

        #webcam-container {
            border: 5px solid white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            background: #000;
            width: 310px;
            height: 310px;
        }

        /* Стиль для панели обратной связи */
        #feedback-panel {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 300px;
        }

        .class-btn {
            background-color: #5bc0de;
            font-size: 14px;
            min-width: 200px;
            margin: 5px 0;
        }

        .footer-info {
            margin-top: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #003366;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 15px;
            max-width: 90%;
            text-align: left;
        }

        .footer-info img {
            height: 55px;
            width: auto;
            flex-shrink: 0;
        }

        .footer-info p {
            font-size: 13px;
            line-height: 1.4;
            margin: 0;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <h1>Мониторинг намораживания инея</h1>
    
    <button type="button" onclick="init()">Включить камеру</button>
    
    <div id="webcam-container"></div>
    <div id="label-container">Включи камеру</div>

    <button id="error-btn" style="display:none; background-color: #d9534f;" onclick="showFeedback()">Модель ошиблась? Помоги ей!</button>

    <div id="feedback-panel">
        <p style="color: #003366; font-weight: bold; margin-top: 0;">Какой класс верный?</p>
        <div id="class-buttons"></div>
        <button onclick="hideFeedback()" style="background-color: #888; font-size: 14px; min-width: 100px;">Отмена</button>
    </div>
    <div class="footer-info">
        <img src="emblem.png" alt="БГУТ">
        <p>© 2026, Научно-исследовательская работа студентов гр. НТ-241, БГУТ</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/t6ijRGo9j/";
        
        // Настройки Telegram
        const TG_TOKEN = "8620406422:AAERiA21lVU5VyKHi4MeBk7SPIxNyHftBQw";
        const TG_CHAT_ID = "-5132674165";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            
            const flip = false; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");

            // Показываем кнопку ошибки после запуска камеры
            document.getElementById("error-btn").style.display = "inline-block";
            
            // Создаем кнопки классов для обратной связи автоматически
            createClassButtons();
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let bestPrediction = "";
            let highestProb = 0;

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestPrediction = prediction[i].className;
                }
            }
            labelContainer.innerHTML = bestPrediction;
        }

        // --- ФУНКЦИИ ОБРАТНОЙ СВЯЗИ ---

        function createClassButtons() {
            const container = document.getElementById("class-buttons");
            container.innerHTML = ""; // Очистка
            
            // Получаем названия классов из метаданных модели
            const classes = model.getClassLabels();
            
            classes.forEach(className => {
                const btn = document.createElement("button");
                btn.innerText = className;
                btn.className = "class-btn";
                btn.onclick = () => sendFeedback(className);
                container.appendChild(btn);
            });
        }

        function showFeedback() {
            document.getElementById("feedback-panel").style.display = "block";
            document.getElementById("error-btn").style.display = "none";
        }

        function hideFeedback() {
            document.getElementById("feedback-panel").style.display = "none";
            document.getElementById("error-btn").style.display = "inline-block";
        }

        async function sendFeedback(correctClass) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Отправка...";
            btn.disabled = true;

            // 1. Делаем снимок с канваса
            const canvas = webcam.canvas;
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("chat_id", TG_CHAT_ID);
                formData.append("photo", blob, "error.jpg");
                formData.append("caption", ❌ Ошибка нейросети!\nПравильный класс: ${correctClass}\nДата: ${new Date().toLocaleString()});
            try {
                    const response = await fetch(https://api.telegram.org/bot${TG_TOKEN}/sendPhoto, {
                        method: "POST",
                        body: formData
                    });

                    if (response.ok) {
                        alert("Спасибо! Фото отправлено в чат для дообучения.");
                    } else {
                        alert("Ошибка при отправке в Telegram.");
                    }
                } catch (e) {
                    alert("Не удалось связаться с Telegram.");
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    hideFeedback();
                }
            }, "image/jpeg", 0.8);
        }
    </script>
</body>
</html>
